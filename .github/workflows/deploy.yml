name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  #v6.0.2
        with:
          fetch-depth: '0'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  #v6.4.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Package
        run: npm run build

      - name: Upload to Server
        uses: milanmk/actions-file-deployer@b204fec5b826c391b116c40b789df470a4fb6870  # 1.18
        with:
          remote-host: ${{ secrets.DEPLOY_SERVER }}
          remote-user: ${{ secrets.DEPLOY_USERNAME }}
          remote-password: ${{ secrets.DEPLOY_PASSWORD }}
          remote-path: ${{ secrets.DEPLOY_DIR }}
          local-path: ./dist/

      - name: Send Pushover Notification
        uses: umahmood/pushover-actions@5da31193f672e7418804bdb51836bdf20f393c8f  # v1.1.0
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        with:
          title: Changes deployed to erin.dev
          status: ${{ job.status }}
          url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          url_title: View workflow
